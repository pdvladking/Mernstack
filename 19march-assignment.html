<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Details</title>
  </head>

  <body>
    <fieldset>
      <legend>
        Employee Details
      </legend>
      <form action="post">

        <label for="fname">First name:</label>
        <input type="text" name="fname" id="fname" placeholder="Enter your first name"><br><br>

        <label for="lname">Last name:</label>
        <input type="text" name="lname" id="lname" placeholder="Enter your last name"><br><br>

        <label for="male">Male</label>
        <input type="radio" name="option" id="male">

        <label for="female">Female</label>
        <input type="radio" name="option" id="female"><br><br>

        <label for="employeeid">Employee ID:</label>
        <input type="text" name="employeeid" id="employeeid"><br><br>

        <label for="designation">Designation</label>
        <input type="text" name="designation" id="designation"><br><br>

        <label for="phoneno">Phone Number</label>
        <input type="tel" name="phoneno" id="phoneno"><br><br>

        <input type="submit" value="submit">

      </form>

    </fieldset>

  </body>

</html>
